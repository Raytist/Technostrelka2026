<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Yandex OAuth Тест</title>
</head>
<body style="font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #fdfdfd;">

        display: inline-block;
        margin-top: 20px;
        padding: 15px 30px; 
        background-color: #ffcc00; 
        color: black; 
        text-decoration: none; 
        font-weight: bold; 
        border-radius: 8px;
        font-size: 16px;
        box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
